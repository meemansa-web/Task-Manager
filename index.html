<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="app-container">
    <header class="card">
      <div class="header-top">
        <h1>Task Manager ✅</h1>
        <button id="themeToggle" class="theme-btn" title="Toggle Dark Mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
      
      <form id="taskForm">
        <div class="input-group">
          <input type="text" id="taskInput" placeholder="Add a new task...">
          <button type="submit" class="add-btn">
            <i class="fas fa-plus"></i> Add
          </button>
        </div>
      </form>

      <!-- Task Statistics -->
      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="totalTasks">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="completedTasks">0</span>
          <span class="stat-label">Completed</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="activeTasks">0</span>
          <span class="stat-label">Active</span>
        </div>
      </div>

      <!-- Filter Buttons -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </header>

    <section id="taskContainer" class="task-list"></section>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal" id="confirmModal">
    <div class="modal-content">
      <h2>Confirm Delete</h2>
      <p>Are you <strong>really</strong> sure you want to delete this task?</p>
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelDelete">Cancel</button>
        <button class="confirm-btn" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Edit Task</h2>
      <input type="text" id="editInput" placeholder="Edit your task...">
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelEdit">Cancel</button>
        <button class="save-btn" id="saveEdit">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
